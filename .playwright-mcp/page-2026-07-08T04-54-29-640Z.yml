                              - text: Last year, I was sitting with merely an idea in my notebook.
                              - text: I didn't have a luxurious office at my disposal. No large budget. No team. Just me, my laptop, and a vision.
                              - text: Today, that notion has developed into Adexy—a creative agency helping clients convey their stories through cinematic advertisements and AI-powered content.
                              - text: It wasn’t easy.
                              - text: 👉 Countless late nights studying tools.
                              - text: 👉 Pitching clients who didn’t believe at first.
                              - text: 👉 Designing until the sun came up.
                              - text: "But here’s the truth: you don’t need flawless conditions to start."
                              - text: You need to start messy, learn fast, and adjust even faster.
                              - text: "If there’s one thing I’ve learned, it’s this: \"Execution beats ideas.\""
                              - text: Grateful for the early sponsors, the first clients that trusted me, and the community that encourages me to grow.
                              - text: This is just the beginning.
