                            - generic [ref=e1065]:
                              - text: Third time posting this. Still haven't found the right person.
                              - text: And I think I now understand why.
                              - text: After multiple rounds of applications, the pattern is clear — most people are applying without actually reading the post. Not skimming it. Not reading it.
                              - text: That alone disqualifies you for this role.
                              - text: Here's why that matters 👇
                              - text: A Product Owner's job — at its most fundamental level — is attention to detail. It's reading requirements carefully. It's understanding context before acting. It's not moving forward until you're confident you've understood the brief.
                              - text: If you can't demonstrate that in how you apply, I have no reason to believe you'll demonstrate it on the job.
                              - text: So before you do anything else — read the full post below. Slowly. Carefully.
                              - text: "Then ask yourself:"
                              - text: 📍 Am I actually based in Colombo, Sri Lanka or Chennai, India?
                              - text: This is not flexible. Remote means remote from Colombo or Chennai — not from anywhere else.
                              - text: 🛠 Do I genuinely have the mandatory technical skills?
                              - text: Not "I've heard of Jira." Not "I've used ChatGPT a few times."
                              - text: Hands-on. Demonstrable. On your CV.
                              - text: 🧠 Do I understand what a Product Owner actually does?
                              - text: Not the theory. The real work — client conversations, backlog ownership, user stories, stakeholder management, research, decisions.
                              - text: 📄 Does my CV show the match — clearly and without ambiguity?
                              - text: If I have to dig for evidence that you qualify, the answer is no.
                              - text: I'm not raising the bar. The bar was always there. I'm just asking you to clear it.
                              - text: The right person is out there. They'll read this carefully, check themselves honestly, and apply with a CV that speaks for itself.
                              - text: Are you that person? 👇
