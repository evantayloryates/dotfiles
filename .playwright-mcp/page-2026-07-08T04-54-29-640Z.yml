                                - strong [ref=e959]: Vnoth Gunasegaran ( Vee )
                              - text: left a running business in the middle of COVID to start a coffee company everyone told him would fail. Nearly six years on,
                              - link "Cuppa Cartel" [ref=e960] [cursor=pointer]:
                                - /url: https://www.linkedin.com/company/cuppa-cartel/
                                - strong [ref=e962]: Cuppa Cartel
                              - text: is still standing. When a client once asked if he did valet service, the answer he gave on the spot was "yeah, of course we do."
                              - link "Laki Mafi" [ref=e963] [cursor=pointer]:
                                - /url: https://www.linkedin.com/in/laki-mafi-4b8bb627a/
                                - strong [ref=e965]: Laki Mafi
                              - text: is a former military operator with two deployments to Afghanistan, now co-owner of a roadworks company and a coach for men off the tools. I asked him what he's learned about love. What he told me will stay with you.
