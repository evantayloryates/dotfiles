                            - paragraph [ref=e1276]:
                              - link "Watching teams reach for the runtime that's easiest to hire for, then hand-roll fault tolerance on top of it. A real-time marketplace is a concurrency problem wearing a product costume. At GigSmart I reached for Elixir because process isolation was the floor, not an upgrade I had to build myself. One slow request shouldn't take down the ones next to it — on the BEAM it doesn't, by default. Reach for that kind of runtime when concurrency is the product. When it isn't, it's a tax you didn't need. →" [ref=e1277] [cursor=pointer]:
