                              - text: I've lost count of the ideas I sat on because I was waiting to feel ready. Waiting for the plan to be tighter. The offer to be perfect. The timing to be right.
                              - text: That moment never arrives the way you think it will. You just get older, and the idea gets quieter.
                              - link "Vnoth Gunasegaran ( Vee )" [ref=e957] [cursor=pointer]:
