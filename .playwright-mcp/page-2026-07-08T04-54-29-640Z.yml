                                - strong [ref=e1147]: DigitalT3
                              - text: This role isn't for everyone — and that's intentional.
                              - text: We're looking for someone who brings more than a CV. Someone who walks into a client room with confidence, asks the right questions, and leaves with clarity. Someone who can break down a complex problem analytically, back it up with research, and then own the outcome — start to finish.
                              - text: "📍 Location: Colombo, Sri Lanka or Chennai, India — 100% remote (in mentioned locations)"
                              - text: "Experience: 6 months – 2 years"
                              - text: Here's the kind of person we're looking for 👇
                              - text: 💬 Outgoing & people-first
                              - text: You're the person clients actually enjoy working with. You build rapport quickly, communicate with ease, and know how to read a room. Product management is a people sport — and you get that.
                              - text: 🧠 Analytical & logical
                              - text: You don't just collect information — you make sense of it. You can spot patterns, challenge assumptions, and turn messy inputs into clear, structured thinking.
                              - text: 📋 Real client & BA experience
                              - text: You've worked on live products or business analysis — not just theory. You understand what it means to gather requirements in the real world, navigate stakeholder expectations, and translate business needs into actionable deliverables.
                              - text: 🔬 Research-driven
                              - text: You dig deeper than the surface. Whether it's market research, competitor analysis, or user feedback — you bring evidence to the table, not just opinions.
                              - text: 🗣️ Excellent communicator
                              - text: Written, verbal, async, in a meeting — it doesn't matter. You articulate ideas clearly, adapt your style to your audience, and make complex things simple.
                              - text: 🎯 Accountability & ownership
                              - text: You don't wait to be chased. You take responsibility for your work, flag issues early, and see things through. If it's on your plate, it gets done.
                              - text: ─────────────────────────────
                              - text: 🛠 Technical skills you must have
                              - text: "These aren't nice-to-haves. They're required:"
                              - text: • Hands-on experience with product management tools — Jira, Confluence, Trello, or similar
                              - text: • Working knowledge of the software development lifecycle (SDLC)
                              - text: • Proficiency in Microsoft Office Suite and/or Google Workspace
                              - text: • Data analysis using Excel or Google Sheets
                              - text: • AI tool fluency — ChatGPT, Claude, Notion AI, or similar
                              - text: • Prompt engineering skills for generating requirements, user stories, and product visions
                              - text: • Familiarity with AI-powered productivity tools (Grammarly, Notion AI, etc.)
                              - text: • Understanding of AI concepts — ML, LLMs, training data, AI ethics & bias
                              - text: ─────────────────────────────
                              - text: ⚠️ Please apply only if you have 60%+ alignment to the required skills. We value quality over volume — apply if it genuinely fits, not just because it's open.
                              - text: Certifications (CSPO, PSPO I, AI fundamentals) are a plus, not a prerequisite.
                              - text: If you recognise yourself in this — or know someone who does, send your profile to
