                                        - strong [ref=f104e784]: Spaceback
                                      - text: with a crazy idea and not even a whiteboard. Today, I’m officially stepping down as CEO after helping lead the company to a successful exit.
                                      - text: What a ride.
                                      - text: We always believed that social content would become one of the most important forms of media in the world and that brands would need better ways to use it. We built products, won customers, raised capital, navigated more twists and turns than I can count, and ultimately built a business that created meaningful value for employees, investors, customers, and partners.
                                      - text: Very few founders get to write a sentence like that.
                                      - text: For nearly a decade, we managed to keep the core of this team together through all the highs, lows, pivots, challenges, and opportunities that come with building a startup. I got the chance to take this wild ride, which has been the greatest wild ride of my life, because of the partners, customers, investors, employees, advisors, friends, and family who believed in what we were doing. What a gift!
                                      - text: Thank you from the centroid of my heart.
                                      - text: "I’m stepping down to do something I’ve never done: take a summer off! I'll be spending the next few months with my wife and our one-year-old before sharing what's next later this year."
