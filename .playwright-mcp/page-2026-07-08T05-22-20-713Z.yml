                                      - text: It's easy and obvious to say that AI was a focal point at Cannes this year but beyond that buzz, the real excitement was taking place in CTV among the streaming platforms.
                                      - text: "Despite all the innovative tech being developed (hot take: generative AI video creative is still far inferior to content created by humans), it is old-fashioned partnerships and collaboration advancing the industry. A slew of partnership announcements were released by leaders (and sometimes competitors) like Amazon, Roku, Comcast Universal Ads, LG Ads, Walmart, TTD, Disney, NBCU and Netflix propelling the industry toward a more symbiotic ecosystem that will benefit advertisers of all sizes."
                                      - text: Partnerships are accelerating outcomes and enabling brands to more easily connect with audiences in the living room in smarter, more engaging and scalable ways. We're grateful to be in the room (beach/yacht/gutter bar) where it happened.
