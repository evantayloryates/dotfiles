                                      - text: ", and"
                                      - link "Chris Baclig" [ref=f141e744]:
                                        - /url: https://www.linkedin.com/in/chrisbaclig/
                                        - strong [ref=f141e746]: Chris Baclig
                                      - text: "—it has been an honor and a blast building this dream together. To everyone at Rembrand: keep building the future. I’ll be cheering like crazie from the sidelines."
