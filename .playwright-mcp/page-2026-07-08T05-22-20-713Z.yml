                                    - generic [ref=f141e736]:
                                      - text: After nearly 8.5 years, I’ve made the decision to hang it up and step down from my role as Chief Customer Officer at Spaceback by Rembrand.
                                      - text: I still fondly remember the early days of Spaceback, filled with kind of optimism that only exists before you know how hard the thing actually is.
                                      - text: We set out to provide users with a better ad experience—one that prioritizes social content over promotional banners and commercials. In the process we built an all star team, an innovative platform, an enviable brand, and an entirely new creative category around it (which spawned many copycats). I’m so grateful to all of our brands, agencies, and partners who trusted us along the way. Our years of dedication culminated in a successful exit to one of the truly unique AI advertising companies in the world.
                                      - text: The right ending to a great chapter is knowing when to start the next one. Amidst the brain fog of sleepless nights during paternity leave, I found the clarity and confidence to take this next step. So this summer I’m logging off and spending it where it matters most—with my family. That early days feeling of optimism for what lies ahead has returned.
                                      - text: I could paint the rest of this post blue with gratitude to all the teammates, investors, advisors who have been on this ride with me along the way. But special shout out to
                                      - link "Casey Saran" [ref=f141e738]:
                                        - /url: https://www.linkedin.com/in/caseysaran/
                                        - strong [ref=f141e740]: Casey Saran
