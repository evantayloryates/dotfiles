                                    - generic [ref=f141e958]:
                                      - text: "🚀 Big news today:"
                                      - link "Spaceback" [ref=f141e959]:
                                        - /url: https://www.linkedin.com/company/spaceback/
                                        - strong [ref=f141e961]: Spaceback
                                      - text: is merging with
                                      - link "Rembrand" [ref=f141e962]:
                                        - /url: https://www.linkedin.com/company/getrembrand/
                                        - strong [ref=f141e964]: Rembrand
                                      - text: "From day one, our mission at Spaceback has been simple: ads don’t have to suck. We set out to make advertising feel more like content — authentic, creative, and aligned with how people actually consume media."
                                      - text: "Now, by joining forces with Rembrand, we’re taking that mission further. Together we’re building the industry’s premier AI creative platform for programmatic video advertising — one that brings:"
                                      - text: ✨ Virtual Product Placement
                                      - text: ✨ Social Content Ads
                                      - text: ✨ Streamlined activation across CTV, digital video, and display
                                      - text: For our clients and partners, this means speed, scale, and a new level of creative storytelling that doesn’t interrupt — it connects.
                                      - text: This is a huge moment for our team (special shoutout to
                                      - link "Casey Saran" [ref=f141e966]:
