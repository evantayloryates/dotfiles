                    - heading "About" [level=2] [ref=f128e702]
                    - paragraph [ref=f128e704]:
                      - generic [ref=f128e705]:
                        - text: I'm a builder by nature and enjoy solving the problems that no one else has before in ways that are simple but powerful. Technology in itself is not the solution to any problem, but it's a tool that enables simplicity that was never possible before it. It's out of that simplicity that great solutions are born.
                        - text: I believe that quality of a product is is measured by both it's effectiveness to solve human problems and it's ability to adapt when those problems change. I've found that the most effective ways to build quality products require fast iterations, solid programming fundamentals and continuous integration. Miscues are inevitable, but the quickest way to learn from your mistakes is to fail faster.
                        - text: I excel in a fast-paced environment, where success is only limited by what you limit it to. I'm a team-player at the core and am willing to be whoever I need to be in order to get the whole team across the finish line. I've learned that being a leader is less about giving orders to followers and more about giving context to partners.
