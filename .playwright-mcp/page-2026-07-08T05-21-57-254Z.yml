                                        - text: We’re thrilled to announce CTV Launchpad! 🚀
                                        - text: Designed to deliver creative agility, CTV Launchpad makes it even easier to use Spaceback’s Social CTV™. It introduces a host of new capabilities including pause ads, branding, versioning, and more. Get the ease and authenticity of social and the reach and big format of CTV in one place with no additional creative cost. 🔥
