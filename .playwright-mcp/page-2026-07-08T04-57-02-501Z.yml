                      - text: ✔ Industry Experts & Executive Advisors
                      - text: Today, 4,700+ executive leaders are already part of this growing community.
                      - text: They didn't join simply to increase their contacts.
                      - text: "They joined to gain something far more valuable:"
                      - text: Access.
